services:
  - type: web
    name: priceai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 60 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: RATE_LIMIT_PER_MIN
        value: "120"
      - key: PYTHON_VERSION
        value: 3.12.7
